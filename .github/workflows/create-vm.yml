name: Try to Create OCI VM

on:
  workflow_dispatch:

env:
  OCI_COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
  IMAGE_ID: ${{ secrets.IMAGE_ID }}
  OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
  AD_NAME: ${{ secrets.AD_NAME }}
  OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
  OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
  OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
  OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
  OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

jobs:
  create-vm:
    runs-on: ubuntu-latest
    steps:
      - name: Cache OCI CLI
        uses: actions/cache@v4
        with:
          path: ~/.local
          key: ${{ runner.os }}-pip-oci-cli-v1

      - name: Add OCI CLI to path
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Setup OCI CLI and try to create VM
        id: create_vm
        continue-on-error: true
        run: |
          set -o pipefail

          pip install oci-cli

          mkdir -p ~/.oci
          echo "${OCI_CLI_KEY_CONTENT}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=${OCI_CLI_USER}
          tenancy=${OCI_CLI_TENANCY}
          fingerprint=${OCI_CLI_FINGERPRINT}
          key_file=~/.oci/oci_api_key.pem
          region=${OCI_CLI_REGION}
          EOF

          echo "${{ secrets.SSH_PUBLIC_KEY }}" > /home/runner/my_ssh_key.pub

          OCI_OUTPUT=$(oci compute instance launch \
            --compartment-id "$OCI_COMPARTMENT_ID" \
            --availability-domain "$AD_NAME" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus":4,"memoryInGBs":24}' \
            --subnet-id "$OCI_SUBNET_ID" \
            --source-details "{\"bootVolumeSizeInGBs\":150,\"bootVolumeVpusPerGB\":120,\"imageId\":\"$IMAGE_ID\",\"sourceType\":\"image\"}" \
            --ssh-authorized-keys-file "/home/runner/my_ssh_key.pub" \
            --assign-public-ip true \
            --display-name "coolify-vm" 2>&1 || true)

          {
            echo "log_data<<EOF"
            echo "$OCI_OUTPUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if echo "$OCI_OUTPUT" | grep -q '"lifecycle-state": "PROVISIONING"'; then
            echo "Success: VM is provisioning."
            echo "created=true" >> "$GITHUB_OUTPUT"
            echo "status=success" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "VM was not created on this attempt."
          echo "created=false" >> "$GITHUB_OUTPUT"
          echo "status=failure" >> "$GITHUB_OUTPUT"

      - name: Send Discord notification
        if: always() && env.DISCORD_WEBHOOK_URL != ''
        uses: sarisia/actions-status-discord@v1.15.4
        with:
          webhook: ${{ env.DISCORD_WEBHOOK_URL }}
          title: "OCI VM Status: ${{ steps.create_vm.outputs.status }}"
          status: ${{ steps.create_vm.outputs.status }}
          color: ${{ steps.create_vm.outputs.created == 'true' && '0x28a745' || '0xdc3545' }}
          description: |
            Attempt to create A1.Flex VM in `${{ secrets.OCI_CLI_REGION }}`.
            **Status:** `${{ steps.create_vm.outputs.status }}`

            **Log Output:**
            ```json
            ${{ steps.create_vm.outputs.log_data }}
            ```

      - name: Fail if VM was not created
        if: steps.create_vm.outputs.created != 'true'
        run: exit 1
